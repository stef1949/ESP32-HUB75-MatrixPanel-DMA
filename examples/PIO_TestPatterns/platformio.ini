[platformio]
default_envs = esp32
description = HUB75 ESP32 I2S DMA test patterns example
;src_dir = src

[env]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/53.03.13/platform-espressif32.zip
board = wemos_d1_mini32
lib_deps =
    https://github.com/FastLED/FastLED.git
    Wire
    https://github.com/adafruit/Adafruit_BusIO.git
    https://github.com/adafruit/Adafruit-GFX-Library.git
    https://github.com/mrfaptastic/ESP32-HUB75-MatrixPanel-I2S-DMA.git
upload_speed = 460800
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
;
; Toolchain fallback mirrors
; -------------------------
; Some CI/proxy environments block dl.platformio.org / dl.registry.platformio.org,
; which causes HTTPClientError when downloading PlatformIO-hosted Xtensa/RISC-V
; toolchains and GDB packages. Pinning these to Espressif GitHub release assets
; avoids those blocked domains while keeping equivalent tool families.
platform_packages =
    platformio/toolchain-xtensa-esp-elf@file://../../tools/pio-packages/toolchain-xtensa-esp-elf
    platformio/toolchain-riscv32-esp@https://github.com/espressif/crosstool-NG/releases/download/esp-13.2.0_20240530/riscv32-esp-elf-13.2.0_20240530-x86_64-linux-gnu.tar.xz
    platformio/tool-xtensa-esp-elf-gdb@https://github.com/espressif/binutils-gdb/releases/download/esp-gdb-v16.3_20250913/xtensa-esp-elf-gdb-16.3_20250913-x86_64-linux-gnu.tar.gz
    platformio/tool-riscv32-esp-elf-gdb@https://github.com/espressif/binutils-gdb/releases/download/esp-gdb-v16.3_20250913/riscv32-esp-elf-gdb-16.3_20250913-x86_64-linux-gnu.tar.gz
    platformio/tool-scons@file://../../tools/pio-packages/tool-scons
    tasmota/tool-mklittlefs@file://../../tools/pio-packages/tool-mklittlefs

[env:esp32]
framework = arduino

[env:esp32idf]
framework = arduino, espidf
